<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>БАЗА · Админ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080a0f;--bg2:#0d1018;--bg3:#131720;--line:#1e2535;
      --tx:#e8ecf4;--tx2:#8b9ab7;--ac:#4f7cff;--ok:#22c97a;--err:#ff4d6a;--warn:#f0b429;
      --rad:14px;--shadow:0 10px 40px rgba(0,0,0,.45);
      --font:'DM Sans',system-ui,sans-serif;--head:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh}
    .wrap{max-width:1150px;margin:0 auto;padding:20px}
    .top{
      display:flex;gap:12px;align-items:center;justify-content:space-between;
      padding:16px 18px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,var(--bg2),rgba(13,16,24,.55));
      box-shadow:var(--shadow)
    }
    .brand{font-family:var(--head);font-weight:800;letter-spacing:2px}
    .pill{font-family:var(--mono);font-size:12px;color:var(--tx2)}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:14px;margin-top:14px}
    .card{border:1px solid var(--line);border-radius:18px;background:var(--bg2);box-shadow:var(--shadow)}
    .card h3{font-family:var(--head);font-size:15px;padding:14px 16px;border-bottom:1px solid var(--line)}
    .card .body{padding:14px 16px}
    label{display:block;color:var(--tx2);font-size:12px;margin:10px 0 6px}
    input,select,button,textarea{
      font:inherit;color:var(--tx);background:var(--bg3);border:1px solid var(--line);border-radius:12px;
      padding:10px 12px;outline:none;width:100%;
    }
    button{cursor:pointer;background:var(--ac);border-color:transparent;font-weight:700}
    button.secondary{background:transparent;border-color:var(--line);color:var(--tx)}
    .row{display:flex;gap:10px;align-items:center}
    .row>*{flex:1}
    .muted{color:var(--tx2);font-size:12px}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .kpi .box{padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--bg3)}
    .kpi .n{font-family:var(--head);font-weight:800;font-size:22px}
    .kpi .t{color:var(--tx2);font-size:12px;margin-top:3px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:12px;color:var(--tx2);text-align:left}
    td{font-size:13px}
    .mono{font-family:var(--mono);font-size:12px}
    .tag{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:11px}
    .tag.ok{border-color:rgba(34,201,122,.35);color:var(--ok)}
    .tag.warn{border-color:rgba(240,180,41,.35);color:var(--warn)}
    .tag.err{border-color:rgba(255,77,106,.35);color:var(--err)}
    .scroll{max-height:520px;overflow:auto}
    .btns{display:flex;gap:8px;margin-top:10px}
    .btns button{width:auto;flex:0 0 auto;padding:10px 14px}
    @media(max-width:980px){.grid{grid-template-columns:1fr}.scroll{max-height:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="brand">БАЗА · ADMIN</div>
        <div class="pill" id="connPill">socket: …</div>
      </div>
      <div class="row" style="max-width:560px">
        <input id="adminKey" placeholder="Admin Key (BAZA_ADMIN_KEY)" autocomplete="off" />
        <button id="btnAuth">Войти</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Статистика</h3>
        <div class="body">
          <div class="kpi">
            <div class="box"><div class="n" id="kUsers">—</div><div class="t">Пользователей</div></div>
            <div class="box"><div class="n" id="kOnline">—</div><div class="t">Онлайн</div></div>
            <div class="box"><div class="n" id="kMsgs">—</div><div class="t">Сообщений сегодня</div></div>
            <div class="box"><div class="n" id="kDisk">—</div><div class="t">Медиа (байт)</div></div>
          </div>
          <div class="btns">
            <button class="secondary" id="btnStats">Обновить</button>
            <button class="secondary" id="btnUsers">Пользователи</button>
          </div>
          <div class="muted" style="margin-top:10px">Подсказка: логи и действия находятся справа.</div>
        </div>
      </div>

      <div class="card">
        <h3>Логи (audit)</h3>
        <div class="body">
          <div class="row">
            <input id="fAction" placeholder="action содержит (например: premium.buy)" />
            <select id="fSeverity">
              <option value="">severity: any</option>
              <option value="info">info</option>
              <option value="warn">warn</option>
              <option value="error">error</option>
            </select>
          </div>
          <div class="row" style="margin-top:10px">
            <input id="fActor" placeholder="actorPhone" class="mono" />
            <input id="fTarget" placeholder="targetPhone" class="mono" />
          </div>
          <div class="row" style="margin-top:10px">
            <input id="fSince" placeholder="since (ISO) 2026-03-26T00:00:00.000Z" class="mono" />
            <input id="fUntil" placeholder="until (ISO)" class="mono" />
          </div>
          <div class="btns">
            <button class="secondary" id="btnLogs">Загрузить</button>
            <button class="secondary" id="btnPrev">←</button>
            <button class="secondary" id="btnNext">→</button>
            <span class="muted" id="pageInfo" style="align-self:center;margin-left:auto">—</span>
          </div>
          <div class="scroll" style="margin-top:12px">
            <table>
              <thead>
                <tr>
                  <th>время</th>
                  <th>action</th>
                  <th>actor</th>
                  <th>target</th>
                  <th>meta</th>
                </tr>
              </thead>
              <tbody id="logsBody">
                <tr><td colspan="5" class="muted">Нет данных</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <h3>Пользователи (последние)</h3>
      <div class="body scroll">
        <table>
          <thead>
            <tr>
              <th>phone</th>
              <th>nickname</th>
              <th>role</th>
              <th>status</th>
              <th>premium</th>
              <th>ban</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="6" class="muted">Нажмите “Пользователи”</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const state = { key: '', authed: false, logs: { offset: 0, limit: 50, total: 0 } };
    const $ = (id) => document.getElementById(id);
    const socket = io({ transports: ['websocket','polling'] });

    function setConn(text){ $('connPill').textContent = text; }
    function sevTag(sev){
      const cls = sev === 'warn' ? 'warn' : sev === 'error' ? 'err' : 'ok';
      return `<span class="tag ${cls}">${sev || 'info'}</span>`;
    }
    function safe(s){ return (s == null ? '' : String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    socket.on('connect', () => setConn('socket: connected'));
    socket.on('disconnect', () => setConn('socket: disconnected'));
    socket.on('connect_error', (e) => setConn('socket: error ' + (e?.message || '')));

    socket.on('admin:auth:ok', () => {
      state.authed = true;
      $('btnAuth').textContent = 'OK';
      $('btnAuth').disabled = true;
      $('adminKey').disabled = true;
    });
    socket.on('admin:auth:error', (m) => alert(m || 'auth error'));
    socket.on('admin:error', (m) => alert(m || 'admin error'));

    socket.on('admin:stats:result', (d) => {
      $('kUsers').textContent = d?.totalUsers ?? '—';
      $('kOnline').textContent = d?.onlineUsers ?? '—';
      $('kMsgs').textContent = d?.messagesToday ?? '—';
      $('kDisk').textContent = d?.diskUsage ?? '—';
    });

    socket.on('admin:users:result', (users) => {
      const body = $('usersBody');
      if (!users?.length) { body.innerHTML = `<tr><td colspan="6" class="muted">Нет пользователей</td></tr>`; return; }
      body.innerHTML = users.slice(0, 200).map(u => `
        <tr>
          <td class="mono">${safe(u.phone)}</td>
          <td>${safe(u.nickname)}</td>
          <td><span class="tag">${safe(u.role || 'user')}</span></td>
          <td>${safe(u.status || '')}</td>
          <td>${u.isPremium ? '<span class="tag ok">premium</span>' : '<span class="tag">—</span>'}</td>
          <td>${u.isBanned ? '<span class="tag err">banned</span>' : '<span class="tag ok">ok</span>'}</td>
        </tr>
      `).join('');
    });

    socket.on('admin:logs:result', (p) => {
      state.logs.total = p?.total || 0;
      state.logs.limit = p?.limit || state.logs.limit;
      state.logs.offset = p?.offset || 0;

      const body = $('logsBody');
      const logs = p?.logs || [];
      if (!logs.length) { body.innerHTML = `<tr><td colspan="5" class="muted">Нет логов</td></tr>`; }
      else {
        body.innerHTML = logs.map(l => {
          let meta = '';
          try { meta = l.meta ? JSON.stringify(JSON.parse(l.meta)) : ''; } catch { meta = l.meta || ''; }
          return `
            <tr>
              <td class="mono">${safe(l.timestamp)}</td>
              <td>${sevTag(l.severity)} <span class="mono">${safe(l.action)}</span></td>
              <td class="mono">${safe(l.actorType || '')} ${safe(l.actorPhone || '')}</td>
              <td class="mono">${safe(l.targetPhone || '')}</td>
              <td class="mono">${safe(meta).slice(0, 2000)}</td>
            </tr>
          `;
        }).join('');
      }

      const page = Math.floor(state.logs.offset / state.logs.limit) + 1;
      const pages = Math.max(1, Math.ceil(state.logs.total / state.logs.limit));
      $('pageInfo').textContent = `${page}/${pages} · ${state.logs.total} записей`;
    });

    function adminAuth(){
      state.key = $('adminKey').value.trim();
      socket.emit('admin:auth', { key: state.key });
    }
    function needAuth(){
      if (!state.authed) { alert('Сначала введите Admin Key'); return false; }
      return true;
    }
    function loadStats(){ if (!needAuth()) return; socket.emit('admin:get_stats', { key: state.key }); }
    function loadUsers(){ if (!needAuth()) return; socket.emit('admin:get_users', { key: state.key }); }
    function loadLogs(offset){
      if (!needAuth()) return;
      state.logs.offset = Math.max(0, offset ?? state.logs.offset);
      socket.emit('admin:get_logs', {
        key: state.key,
        limit: state.logs.limit,
        offset: state.logs.offset,
        action: $('fAction').value.trim(),
        severity: $('fSeverity').value || undefined,
        actorPhone: $('fActor').value.trim() || undefined,
        targetPhone: $('fTarget').value.trim() || undefined,
        since: $('fSince').value.trim() || undefined,
        until: $('fUntil').value.trim() || undefined,
      });
    }

    $('btnAuth').addEventListener('click', adminAuth);
    $('adminKey').addEventListener('keydown', (e) => { if (e.key === 'Enter') adminAuth(); });
    $('btnStats').addEventListener('click', loadStats);
    $('btnUsers').addEventListener('click', loadUsers);
    $('btnLogs').addEventListener('click', () => loadLogs(0));
    $('btnPrev').addEventListener('click', () => loadLogs(state.logs.offset - state.logs.limit));
    $('btnNext').addEventListener('click', () => loadLogs(state.logs.offset + state.logs.limit));
  </script>
</body>
</html>
