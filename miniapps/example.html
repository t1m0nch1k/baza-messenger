<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример Mini App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 20px; font-size: 24px; }
        p { margin-bottom: 20px; opacity: 0.9; }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .counter {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mini App Demo</h1>
        <p>Это пример нативного HTML мини-приложения для мессенджера</p>
        <div class="counter" id="counter">0</div>
        <button onclick="increment()">Нажми меня!</button>
        <button onclick="sendData()" style="margin-top: 10px; background: #667eea; color: white;">Отправить данные</button>
        <div class="info">
            <p>Bot ID: <span id="botId">Загрузка...</span></p>
            <p>Platform: <span id="platform">Web</span></p>
        </div>
    </div>

    <script>
        let count = 0;
        
        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
            
            // Анимация
            const counter = document.getElementById('counter');
            counter.style.transform = 'scale(1.2)';
            setTimeout(() => counter.style.transform = 'scale(1)', 200);
        }
        
        function sendData() {
            // Telegram WebApp API совместимость
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({ action: 'click', count: count }));
            }
            
            // Отправка через postMessage родительскому окну
            window.parent.postMessage({
                type: 'MINI_APP_DATA',
                data: { action: 'click', count: count }
            }, '*');
            
            alert(`Данные отправлены: ${count} кликов`);
        }
        
        // Получение информации о боте из URL параметров или postMessage
        function initBotInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const botId = urlParams.get('botId') || 'demo-bot';
            document.getElementById('botId').textContent = botId;
            
            // Слушаем сообщения от родителя
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'BOT_INFO') {
                    document.getElementById('botId').textContent = event.data.botId;
                }
            });
        }
        
        // Инициализация при загрузке
        initBotInfo();
        
        // Сообщаем о готовности
        window.addEventListener('load', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }
            window.parent.postMessage({ type: 'MINI_APP_READY' }, '*');
        });
    </script>
</body>
</html>
